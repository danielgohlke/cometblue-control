function app() {
  return {
    lang: localStorage.getItem('lang') || 'de',
    translations: TRANSLATIONS,

    t(key) {
      return (this.translations[this.lang] && this.translations[this.lang][key] !== undefined)
        ? this.translations[this.lang][key]
        : (this.translations['en'][key] !== undefined ? this.translations['en'][key] : key);
    },

    setLang(v) {
      this.lang = v;
      localStorage.setItem('lang', v);
    },

    page: localStorage.getItem('cb_page') || 'dashboard',
    devices: [],
    profiles: [],
    status: {},
    alerts: [],

    // Monitor
    monitorHours: 24,
    monitorLoading: false,
    monitorData: {},   // address → records[]

    // Discovery
    discovered: [],
    knownDevices: [],
    discovering: false,
    scanDone: false,
    scanTimeout: 10,
    scanElapsed: 0,
    scanProgress: 0,
    _scanEs: null,

    // Per-device BLE busy state: { address: 'message' }
    busyDevices: {},
    debugMode: false,
    autoPoll: false,

    // Assign discovered device modal
    showAssignModal: false,
    assignDevice: null,
    assignTargetAddress: '',
    assignMsg: '',

    // Set Temp modal
    showSetTemp: false,
    tempLoading: false,
    tempSaving: false,
    selectedDevice: null,
    tempForm: {comfort: '', eco: '', offset: '', child_lock: false},
    tempMsg: '',

    // Schedule modal
    showSchedule: false,
    scheduleLoading: false,
    scheduleSaving: false,
    scheduleMsg: '',
    scheduleForm: null,

    // PIN modal
    showPinPrompt: false,
    pinPromptForm: {pin: ''},
    pinPromptMsg: '',
    pinPromptTesting: false,
    _pendingTempOpen: false,

    // Rename modal
    showRename: false,
    renameDevice: null,
    renameForm: {name: '', mac_address: ''},
    renameMsg: '',

    // Add Device modal
    showAddDevice: false,
    addForm: {address: '', name: '', pin: ''},
    addMsg: '',

    // Profile modal
    showProfileModal: false,
    profileEditMode: false,
    profileForm: {name: '', comfort_temp: '', eco_temp: '', child_lock: null},
    profileScheduleForm: [],
    profileWeekPeriods: [],
    profileWeekendPeriods: [],
    profileSchedTab: 'week',
    profileMsg: '',

    presets: [],
    showPresetModal: false,
    presetEditId: null,
    presetForm: {name: '', assignments: {}},
    presetMsg: '',
    presetApplying: null,
    presetResults: {},
    presetProgress: {},
    presetLog: [],
    presetLogId: null,
    showPresetSetAll: false,
    presetSetAllProfile: '',
    childLockBusy: false,

    pollingDevices: {},
    pollingAll: false,
    showApplyProfile: false,
    applyProfileName: '',
    applyProfileTargets: [],
    applyProfileMsg: '',
    applyProfileApplying: false,
    applyProfileResults: {},
    applyProfileProgress: {done: 0, total: 0},
    applyProfileLog: [],
    toast: '',

    // ─────────────────────────────────────────────────────────────

    async init() {
      // Restore page from localStorage but validate it's a known tab
      const saved = localStorage.getItem('cb_page');
      if (saved && ['dashboard','monitor','devices','profiles','discovery'].includes(saved)) {
        this.page = saved;
        this.onPageChange(saved);
      }
      await this.loadDevices();
      await this.loadProfiles();
      await this.loadPresets();
      await this.loadStatus();
      setInterval(() => this.loadDevices(), 30000);
    },

    onPageChange(tab) {
      if (tab === 'discovery') this.loadKnownDevices();
      if (tab === 'monitor')   this.loadMonitor();
      if (tab === 'szenen')    this.loadPresets();
    },

    async loadDevices() {
      const devs = await fetch(`${API}/api/devices`).then(r => r.json()).catch(() => []);
      for (const d of devs) {
        d.status = await fetch(`${API}/api/devices/${d.address}/status`).then(r => r.json()).catch(() => null);
      }
      this.devices = devs;
      this.computeAlerts();
    },

    computeAlerts() {
      const alerts = [];
      for (const d of this.devices) {
        const name = d.name || d.address.substring(0, 8);
        const s = d.status || {};
        const battery = s.battery;
        // Battery alerts
        if (battery !== null && battery !== undefined && battery !== 255) {
          if (battery <= 10) alerts.push({id: `${d.address}_bat_crit`, level: 'error', msg: `${name}: ${this.t('alert_battery_crit')} (${battery}%)`});
          else if (battery <= 20) alerts.push({id: `${d.address}_bat_low`, level: 'warn', msg: `${name}: ${this.t('alert_battery_low')} (${battery}%)`});
        }
        // Device error / offline
        if (s.error) {
          const isAuth = s.error.includes('auth');
          const msg = isAuth ? `${name}: ${this.t('alert_auth_failed')}` : `${name}: ${this.t('alert_conn_error')}`;
          alerts.push({id: `${d.address}_err`, level: isAuth ? 'error' : 'warn', msg});
        }
        // Not polled yet
        if (!s.polled_at && d.added_at) {
          alerts.push({id: `${d.address}_nopoll`, level: 'info', msg: `${name}: ${this.t('alert_no_poll')}`});
        }
      }
      this.alerts = alerts;
    },

    async loadProfiles() {
      const list = await fetch(`${API}/api/profiles`).then(r => r.json()).catch(() => []);
      const full = [];
      for (const p of list) {
        const data = await fetch(`${API}/api/profiles/${p.name}`).then(r => r.json()).catch(() => null);
        if (data) full.push(data);
      }
      this.profiles = full;
    },

    async loadPresets() {
      this.presets = await fetch(`${API}/api/presets`).then(r => r.json()).catch(() => []);
    },

    openNewPreset() {
      this.presetEditId = null;
      this.presetMsg = '';
      // Default: all devices unassigned
      const assignments = {};
      this.devices.forEach(d => { assignments[d.address] = ''; });
      this.presetForm = {name: '', assignments};
      this.showPresetModal = true;
    },

    openEditPreset(preset) {
      this.presetEditId = preset.id;
      this.presetMsg = '';
      // Fill in any devices not in stored assignments
      const assignments = {};
      this.devices.forEach(d => { assignments[d.address] = preset.assignments[d.address] || ''; });
      this.presetForm = {name: preset.name, assignments};
      this.showPresetModal = true;
    },

    presetSetAll() {
      this.presetSetAllProfile = '';
      this.showPresetSetAll = true;
    },

    confirmPresetSetAll() {
      if (!this.presetSetAllProfile) return;
      this.devices.forEach(d => { this.presetForm.assignments[d.address] = this.presetSetAllProfile; });
      this.showPresetSetAll = false;
    },

    async submitPreset() {
      this.presetMsg = '';
      if (!this.presetForm.name.trim()) { this.presetMsg = this.t('err_name_required'); return; }
      // Only save non-empty assignments
      const assignments = {};
      Object.entries(this.presetForm.assignments).forEach(([addr, prof]) => { if (prof) assignments[addr] = prof; });
      const body = {name: this.presetForm.name.trim(), assignments};
      const res = await fetch(
        this.presetEditId ? `${API}/api/presets/${this.presetEditId}` : `${API}/api/presets`,
        {method: this.presetEditId ? 'PUT' : 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)}
      ).catch(() => null);
      if (!res?.ok) {
        const err = await res?.json().catch(() => ({}));
        this.presetMsg = 'Error: ' + (err?.detail || this.t('err_unknown'));
        return;
      }
      await this.loadPresets();
      this.showPresetModal = false;
      this.showToast(this.t(this.presetEditId ? 'toast_scene_saved' : 'toast_scene_created'));
    },

    async deletePreset(id) {
      if (!confirm(this.t('confirm_delete_scene'))) return;
      await fetch(`${API}/api/presets/${id}`, {method: 'DELETE'});
      await this.loadPresets();
      this.showToast(this.t('toast_scene_deleted'));
    },

    async toggleChildLock(dev) {
      const enabled = !dev.status?.child_lock;
      this._bleLock(this.t('ble_setting_childlock'), dev.address);
      const res = await fetch(`${API}/api/devices/${dev.address}/flags`, {
        method: 'PATCH', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({child_lock: enabled}),
      }).catch(() => null);
      this._bleUnlock(dev.address);
      if (res?.ok) {
        // Optimistically update cached status
        const d = this.devices.find(d => d.address === dev.address);
        if (d?.status) d.status.child_lock = enabled ? 1 : 0;
        this.showToast(`${this.t('toast_childlock_device')} ${enabled ? this.t('toast_childlock_on') : this.t('toast_childlock_off')}: ${dev.name || dev.address.substring(0,8)}`);
      } else {
        this.showToast(this.t('toast_childlock_err'));
      }
    },

    async setChildLockAll(enabled) {
      if (!confirm(this.t(enabled ? 'confirm_childlock_enable' : 'confirm_childlock_disable'))) return;
      this.childLockBusy = true;
      const res = await fetch(`${API}/api/devices/set-child-lock`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({enabled, addresses: ['all']}),
      }).catch(() => null);
      this.childLockBusy = false;
      if (res?.ok) {
        await this.loadDevices();
        this.showToast(this.t(enabled ? 'toast_childlock_all_on' : 'toast_childlock_all_off'));
      } else {
        this.showToast(this.t('toast_childlock_err'));
      }
    },

    _scrollPresetLog() {
      setTimeout(() => { const el = document.getElementById('presetLogEl'); if (el) el.scrollTop = el.scrollHeight; }, 0);
    },

    async applyPreset(preset) {
      this.presetApplying = preset.id;
      this.presetLogId = preset.id;
      this.presetLog = [];
      this.presetResults = {...this.presetResults, [preset.id]: {}};
      this.presetProgress = {...this.presetProgress, [preset.id]: {done: 0, total: 0}};

      const res = await fetch(`${API}/api/presets/${preset.id}/apply`, {method: 'POST'}).catch(() => null);
      if (!res?.ok) { this.presetApplying = null; this.showToast(this.t('toast_preset_apply_err')); return; }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '', event = '', data = '';
      const pid = preset.id;
      while (true) {
        const {value, done} = await reader.read();
        if (done) break;
        buf += decoder.decode(value, {stream: true});
        const lines = buf.split(/\r?\n/);
        buf = lines.pop();
        for (const line of lines) {
          if (line.startsWith('event:')) { event = line.slice(6).trim(); }
          else if (line.startsWith('data:')) { data = line.slice(5).trim(); }
          else if (line.trim() === '' && event && data) {
            try {
              const payload = JSON.parse(data);
              if (event === 'progress') {
                this.presetProgress = {...this.presetProgress, [pid]: {done: payload.index, total: payload.total}};
                this.presetResults = {...this.presetResults, [pid]: {...(this.presetResults[pid] || {}), [payload.address]: 'applying'}};
                const devName = this.devices.find(d => d.address === payload.address)?.name || payload.address.substring(0,8);
                this.presetLog = [...this.presetLog, {text: `→ ${this.t('szenen_applying').replace('…','')} ${devName} (${payload.profile})…`, type: 'info'}];
                this._scrollPresetLog();
              } else if (event === 'result') {
                const prog = this.presetProgress[pid] || {};
                this.presetProgress = {...this.presetProgress, [pid]: {...prog, done: (prog.done || 0) + 1}};
                this.presetResults = {...this.presetResults, [pid]: {...(this.presetResults[pid] || {}), [payload.address]: payload.status}};
                const devName = this.devices.find(d => d.address === payload.address)?.name || payload.address.substring(0,8);
                const resultLine = payload.status === 'ok'
                  ? {text: `✓ ${devName}`, type: 'ok'}
                  : {text: `✗ ${devName}: ${payload.status}`, type: 'error'};
                const log = [...this.presetLog];
                if (log.length > 0) log[log.length - 1] = resultLine; else log.push(resultLine);
                this.presetLog = log;
                this._scrollPresetLog();
              } else if (event === 'done') {
                const total = payload.results ? Object.keys(payload.results).length : 0;
                this.presetProgress = {...this.presetProgress, [pid]: {done: total, total}};
              }
            } catch(e) { console.warn('SSE parse error', e, {event, data}); }
            event = ''; data = '';
          }
        }
      }

      this.presetApplying = null;
      await this.loadDevices();
      this.showToast(`"${preset.name}" ${this.t('toast_scene_applied')}`);
    },

    async loadStatus() {
      this.status = await fetch(`${API}/api/status`).then(r => r.json()).catch(() => ({}));
      if (typeof this.status.auto_poll === 'boolean') this.autoPoll = this.status.auto_poll;
    },

    async toggleAutoPoll() {
      this.autoPoll = !this.autoPoll;
      await fetch(`${API}/api/settings/auto_poll`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({enabled: this.autoPoll}),
      });
    },

    // ── Monitor ─────────────────────────────────────────────────

    async loadMonitor() {
      this.monitorLoading = true;
      // Destroy existing charts
      Object.keys(_charts).forEach(id => destroyChart(id));

      const all = await fetch(`${API}/api/history?hours=${this.monitorHours}&limit=2000`)
        .then(r => r.json()).catch(() => []);

      this.monitorData = {};
      for (const entry of all) {
        this.monitorData[entry.address] = entry.records;
      }

      this.monitorLoading = false;

      // Draw charts after Alpine renders the canvases
      await this.$nextTick();
      const chartLabels = {
        current: this.t('chart_current'),
        comfort: this.t('chart_comfort'),
        eco: this.t('chart_eco'),
        battery: this.t('chart_battery'),
      };
      for (const dev of this.devices) {
        const records = this.monitorData[dev.address] || [];
        drawChart('chart-' + dev.address, records, dev.name, chartLabels);
      }
    },

    // ── Discovery ────────────────────────────────────────────────

    async loadKnownDevices() {
      this.knownDevices = await fetch(`${API}/api/discovery/known`).then(r => r.json()).catch(() => []);
    },

    runDiscovery() {
      if (this.discovering) return;
      if (this._scanEs) { this._scanEs.close(); this._scanEs = null; }

      this.discovering = true;
      this.scanDone = false;
      this.discovered = [];
      this.scanElapsed = 0;
      this.scanProgress = 0;

      const es = new EventSource(`${API}/api/discovery/stream?timeout=${this.scanTimeout}`);
      this._scanEs = es;

      es.addEventListener('device', (e) => {
        const d = JSON.parse(e.data);
        if (!this.discovered.find(x => x.address === d.address)) {
          this.discovered.push(d);
        }
        // Update known list live
        const known = this.knownDevices.find(k => k.address === d.address);
        if (known) { known.last_seen = new Date().toISOString(); }
        else { this.knownDevices.unshift({...d, configured: this.isConfigured(d.address), last_seen: new Date().toISOString(), first_seen: new Date().toISOString()}); }
      });

      es.addEventListener('progress', (e) => {
        const {elapsed, total} = JSON.parse(e.data);
        this.scanElapsed = elapsed;
        this.scanProgress = Math.min(100, (elapsed / total) * 100);
      });

      es.addEventListener('done', () => {
        es.close(); this._scanEs = null;
        this.discovering = false;
        this.scanDone = true;
        this.scanProgress = 100;
        this.loadDevices(); // Refresh RSSI + status on dashboard
      });

      es.onerror = () => {
        es.close(); this._scanEs = null;
        this.discovering = false;
        this.scanDone = true;
        if (!this.discovered.length) this.showToast('Scan error — check Bluetooth.');
      };
    },

    isConfigured(address) {
      return this.devices.some(d => d.address.toUpperCase() === address.toUpperCase());
    },

    async addDiscoveredDirect(d) {
      // Add directly without extra modal (name pre-filled from scan result)
      // Default PIN is 0 (CometBlue factory default = 000000)
      const body = {address: d.address, name: d.name || d.address, pin: 0};
      const res = await fetch(`${API}/api/devices`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
      });
      if (res.ok) {
        await this.loadDevices();
        // Mark as configured in known list
        const known = this.knownDevices.find(k => k.address === d.address);
        if (known) known.configured = true;
        // Mark in scan results
        const found = this.discovered.find(x => x.address === d.address);
        if (found) found._added = true;
        this.showToast(`${d.name} added!`);
      } else {
        const err = await res.json().catch(() => ({}));
        this.showToast('Error: ' + (err.detail || 'Could not add device'));
      }
    },

    // ── Set Temperature ──────────────────────────────────────────

    async openSetTemp(dev) {
      this.selectedDevice = dev;
      this.tempMsg = '';
      this.tempSaving = false;
      this.tempForm = {comfort: '', eco: '', offset: '', child_lock: dev.status?.child_lock ?? false};

      // Only test PIN via BLE if the last poll showed an auth failure.
      // Testing PIN on every open requires a full BLE connection (~45s on Pi 3B+).
      if (dev.pin != null && dev.status?.error?.startsWith('auth_failed')) {
        this._bleLock(this.t('ble_verifying_pin'), dev.address);
        const valid = await this._testStoredPin(dev.address);
        this._bleUnlock(dev.address);
        if (!valid) {
          this._pendingTempOpen = true;
          this._openPinPrompt();
          return;
        }
      }
      this.showSetTemp = true;
      this.tempLoading = true;
      await this._loadTempForm(dev.address);  // handles its own lock/unlock
      this.tempLoading = false;
    },

    async _testStoredPin(address) {
      const res = await fetch(`${API}/api/devices/${address}/test-pin`, {
        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({}),
      }).then(r => r.json()).catch(() => null);
      return res?.valid ?? true;
    },

    async _loadTempForm(address) {
      this._bleLock(this.t('ble_loading_temps'), address);
      const data = await fetch(`${API}/api/devices/${address}/temperatures`).then(r => r.json()).catch(() => null);
      this._bleUnlock(address);
      const dev = this.devices.find(d => d.address === address);
      if (data?.temperatures) {
        this.tempForm = {
          comfort: data.temperatures.comfort ?? '',
          eco: data.temperatures.eco ?? '',
          offset: data.temperatures.offset ?? '',
          child_lock: dev?.status?.child_lock ?? false,
        };
      } else {
        this.tempForm = {
          comfort: dev?.status?.temp_comfort ?? '',
          eco: dev?.status?.temp_eco ?? '',
          offset: dev?.status?.temp_offset ?? '',
          child_lock: dev?.status?.child_lock ?? false,
        };
      }
    },

    async submitSetTemp() {
      this.tempMsg = '';
      this.tempSaving = true;
      const addr = this.selectedDevice.address;
      this._bleLock(this.t('ble_saving_temps'), addr);
      const body = {};
      if (this.tempForm.comfort !== '') body.comfort = parseFloat(this.tempForm.comfort);
      if (this.tempForm.eco     !== '') body.eco     = parseFloat(this.tempForm.eco);
      if (this.tempForm.offset  !== '') body.offset  = parseFloat(this.tempForm.offset);
      const res = await fetch(`${API}/api/devices/${addr}/temperatures`, {
        method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
      });
      // Also update child_lock if changed
      const origLock = this.devices.find(d => d.address === addr)?.status?.child_lock ?? false;
      if (res.ok && this.tempForm.child_lock !== origLock) {
        this._bleLock(this.t('ble_setting_childlock'), addr);
        await fetch(`${API}/api/devices/${addr}/flags`, {
          method: 'PATCH', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({child_lock: this.tempForm.child_lock}),
        });
      }
      this._bleUnlock(addr);
      this.tempSaving = false;
      if (res.ok) {
        this.tempMsg = '✓ Gespeichert';
        await this.loadDevices();
        setTimeout(() => { this.showSetTemp = false; this.tempMsg = ''; }, 1500);
      } else {
        const err = await res.json().catch(() => ({}));
        const detail = err.detail || res.statusText;
        this.tempMsg = 'Error: ' + detail;
        if (detail.toLowerCase().includes('ble') || detail.toLowerCase().includes('auth')) {
          this.showSetTemp = false;
          this._pendingTempOpen = true;
          this._openPinPrompt();
        }
      }
    },

    // ── Schedule ─────────────────────────────────────────────────

    _dayLabels() {
      const de = {monday:'Montag',tuesday:'Dienstag',wednesday:'Mittwoch',thursday:'Donnerstag',friday:'Freitag',saturday:'Samstag',sunday:'Sonntag'};
      const en = {monday:'Monday',tuesday:'Tuesday',wednesday:'Wednesday',thursday:'Thursday',friday:'Friday',saturday:'Saturday',sunday:'Sunday'};
      return this.lang === 'de' ? de : en;
    },

    _emptyScheduleForm() {
      const labels = this._dayLabels();
      return [
        {day: 'monday',    label: labels.monday},
        {day: 'tuesday',   label: labels.tuesday},
        {day: 'wednesday', label: labels.wednesday},
        {day: 'thursday',  label: labels.thursday},
        {day: 'friday',    label: labels.friday},
        {day: 'saturday',  label: labels.saturday},
        {day: 'sunday',    label: labels.sunday},
      ].map(d => ({...d, periods: [{start:'',end:''},{start:'',end:''},{start:'',end:''},{start:'',end:''}]}));
    },

    async openSchedule(dev) {
      this.selectedDevice = dev;
      this.showSchedule = true;
      this.scheduleLoading = true;
      this.scheduleMsg = '';
      this.scheduleForm = this._emptyScheduleForm();
      this._bleLock(this.t('ble_loading_schedule'), dev.address);

      const data = await fetch(`${API}/api/devices/${dev.address}/schedules`)
        .then(r => r.json()).catch(() => null);
      this._bleUnlock(dev.address);

      if (Array.isArray(data)) {
        for (const day of data) {
          const row = this.scheduleForm.find(r => r.day === day.day);
          if (!row) continue;
          const filled = day.periods
            .filter(p => p.start || p.end)
            .map(p => ({start: p.start || '', end: p.end || ''}));
          while (filled.length < 4) filled.push({start: '', end: ''});
          row.periods = filled;
        }
      } else if (data?.detail) {
        this.scheduleMsg = 'Error: ' + data.detail;
      }
      this.scheduleLoading = false;
    },

    validTime(t) {
      if (!t) return true;
      const [h, m] = t.split(':').map(Number);
      return m % 10 === 0;
    },

    async submitSchedule() {
      // Validate: all minutes must be multiples of 10
      for (const row of this.scheduleForm) {
        for (const p of row.periods) {
          if ((p.start && !this.validTime(p.start)) || (p.end && !this.validTime(p.end))) {
            this.scheduleMsg = this.t('err_schedule_times');
            return;
          }
        }
      }
      this.scheduleSaving = true;
      this.scheduleMsg = '';
      const schedAddr = this.selectedDevice.address;
      this._bleLock(this.t('ble_saving_schedule'), schedAddr);
      const body = {};
      for (const row of this.scheduleForm) {
        body[row.day] = row.periods.filter(p => p.start && p.end);
      }
      const res = await fetch(`${API}/api/devices/${schedAddr}/schedules`, {
        method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
      }).then(r => r.json()).catch(() => null);
      this._bleUnlock(schedAddr);
      this.scheduleSaving = false;
      if (res?.status === 'ok') {
        this.scheduleMsg = this.t('toast_schedule_saved');
        setTimeout(() => { this.showSchedule = false; this.scheduleMsg = ''; }, 1500);
      } else {
        this.scheduleMsg = 'Error: ' + (res?.detail || 'Unbekannter Fehler');
      }
    },

    // ── PIN ──────────────────────────────────────────────────────

    openFixPin(dev) {
      this.selectedDevice = dev;
      this._pendingTempOpen = false;
      this._openPinPrompt();
    },

    _openPinPrompt() {
      this.pinPromptForm = {pin: ''}; this.pinPromptMsg = ''; this.pinPromptTesting = false;
      this.showPinPrompt = true;
    },

    async submitPinPrompt() {
      if (this.pinPromptForm.pin === '') { this.pinPromptMsg = this.t('err_pin_empty'); return; }
      this.pinPromptMsg = ''; this.pinPromptTesting = true;
      const pinAddr = this.selectedDevice.address;
      this._bleLock(this.t('ble_verifying_pin'), pinAddr);
      const pin = parseInt(this.pinPromptForm.pin);
      const raw = await fetch(`${API}/api/devices/${pinAddr}/test-pin`, {
        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({pin}),
      }).catch(() => null);
      this._bleUnlock(pinAddr);
      this.pinPromptTesting = false;
      if (!raw) { this.pinPromptMsg = this.t('err_connection'); return; }
      if (!raw.ok && raw.status !== 200) {
        const err = await raw.json().catch(() => ({}));
        this.pinPromptMsg = 'BLE-Fehler: ' + (err.detail || raw.statusText);
        return;
      }
      const res = await raw.json().catch(() => null);
      if (res?.valid) {
        await fetch(`${API}/api/devices/${this.selectedDevice.address}`, {
          method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({pin}),
        });
        this.selectedDevice.pin = pin;
        this.showPinPrompt = false;
        if (this._pendingTempOpen) {
          this._pendingTempOpen = false;
          this.showSetTemp = true; this.tempLoading = true; this.tempMsg = '';
          await this._loadTempForm(this.selectedDevice.address);
          this.tempLoading = false;
        }
        await this.loadDevices();
        this.showToast(this.t('toast_pin_saved'));
      } else {
        this.pinPromptMsg = this.t('err_pin_wrong');
      }
    },

    openAssignModal(discoveredDevice) {

      this.assignMsg = '';
      const res = await fetch(`${API}/api/devices/${this.assignTargetAddress}/assign-address`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},

      }).then(r => r.json()).catch(() => null);

    async rediscoverDevice(dev) {
      this._bleLock(this.t('ble_rediscovering'), dev.address);
      const res = await fetch(`${API}/api/devices/${dev.address}/rediscover`, {method: 'POST'})
        .then(r => r.json()).catch(() => null);
      this._bleUnlock(dev.address);
      if (!res) { this.showToast(this.t('toast_rediscover_err')); return; }
      if (res.status === 'updated') {

      } else {
        this.showToast(this.t('toast_device_not_found') + ': ' + (res.detail || JSON.stringify(res)));
      }
    },

    async pollAll() {
      if (this.pollingAll) return;
      this.pollingAll = true;
      try {
        const res = await fetch(`${API}/api/devices/poll-all`, {method: 'POST'}).catch(() => null);
        if (!res) return;
        const body = await res.json().catch(() => ({}));
        if (body.status === 'already_running') {
          // Already running — just wait for it
        }
        // Wait for the background poll to complete, then reload
        await this._waitForPollComplete();
        await this.loadDevices();
        this.showToast(this.t('toast_poll_all_done'));
      } finally {
        this.pollingAll = false;
      }
    },

    async _waitForPollComplete() {
      const maxWait = 300_000; // 5 min ceiling
      const interval = 1_000;
      const start = Date.now();
      let prevDevice = null;
      const label = this.t('poll_all_progress');
      try {
        while (Date.now() - start < maxWait) {
          await new Promise(r => setTimeout(r, interval));
          try {
            const r = await fetch(`${API}/api/devices/poll-all-status`);
            const s = await r.json();
            const cur = s.current_device || null;
            // Move the busy indicator to the currently-polled device card
            if (prevDevice && prevDevice !== cur) {
              const d = {...this.busyDevices};
              delete d[prevDevice];
              this.busyDevices = d;
            }
            if (cur && cur !== prevDevice) {
              this.busyDevices = {...this.busyDevices, [cur]: label};
            }
            prevDevice = cur;
            if (!s.running) return;
          } catch { /* network hiccup — keep waiting */ }
        }
      } finally {
        // Always clean up the busy indicator, even on timeout or error
        if (prevDevice) {
          const d = {...this.busyDevices};
          delete d[prevDevice];
          this.busyDevices = d;
        }
      }
    },

    async pollDevice(address) {
      if (this.pollingDevices[address] || this.busyDevices[address]) return;
      if (this.pollingAll) {
        this.showToast(this.t('toast_poll_busy'));
        return;
      }
      this.pollingDevices[address] = true;
      this._bleLock(this.t('ble_polling_device'), address);
      try {
        const res = await fetch(`${API}/api/devices/${address}/poll`, {method: 'POST'});
        if (res.status === 409) {
          this.showToast(this.t('toast_poll_busy'));
          return;
        }
        await this.loadDevices();
        this.showToast(this.t('toast_poll_done'));
      } finally {
        this._bleUnlock(address);
        delete this.pollingDevices[address];
      }
    },

    // ── Profiles ─────────────────────────────────────────────────

    _emptyProfileScheduleForm() {
      const labels = this._dayLabels();
      return [
        {day: 'monday',    label: labels.monday},
        {day: 'tuesday',   label: labels.tuesday},
        {day: 'wednesday', label: labels.wednesday},
        {day: 'thursday',  label: labels.thursday},
        {day: 'friday',    label: labels.friday},
        {day: 'saturday',  label: labels.saturday},
        {day: 'sunday',    label: labels.sunday},
      ].map(d => ({...d, periods: [{start:'',end:''},{start:'',end:''},{start:'',end:''},{start:'',end:''}]}));
    },

    _emptyPeriods() {
      return [{start:'',end:''},{start:'',end:''},{start:'',end:''},{start:'',end:''}];
    },

    _periodsFromDay(schedules, day) {
      const raw = (schedules || {})[day] || [];
      const filled = raw.filter(p => p.start || p.end).map(p => ({start: p.start||'', end: p.end||''}));
      while (filled.length < 4) filled.push({start:'', end:''});
      return filled;
    },

    profileDayLabel(day) {
      const de = {monday:'Mo',tuesday:'Di',wednesday:'Mi',thursday:'Do',friday:'Fr',saturday:'Sa',sunday:'So'};
      const en = {monday:'Mon',tuesday:'Tue',wednesday:'Wed',thursday:'Thu',friday:'Fri',saturday:'Sat',sunday:'Sun'};
      const map = this.lang === 'de' ? de : en;
      return map[day] || day;
    },

    applyWeekToSchedule() {
      const days = ['monday','tuesday','wednesday','thursday','friday'];
      for (const row of this.profileScheduleForm) {
        if (days.includes(row.day)) {
          row.periods = this.profileWeekPeriods.map(p => ({...p}));
        }
      }
      this.profileSchedTab = 'individual';
    },

    applyWeekendToSchedule() {
      for (const row of this.profileScheduleForm) {
        if (row.day === 'saturday' || row.day === 'sunday') {
          row.periods = this.profileWeekendPeriods.map(p => ({...p}));
        }
      }
      this.profileSchedTab = 'individual';
    },

    openNewProfile() {
      this.profileEditMode = false;
      this.profileForm = {name: '', comfort_temp: '', eco_temp: '', child_lock: null};
      this.profileScheduleForm = this._emptyProfileScheduleForm();
      this.profileWeekPeriods = this._emptyPeriods();
      this.profileWeekendPeriods = this._emptyPeriods();
      this.profileSchedTab = 'week';
      this.profileMsg = '';
      this.showProfileModal = true;
    },

    openEditProfile(p) {
      this.profileEditMode = true;
      this.profileForm = {
        name: p.name,
        comfort_temp: p.comfort_temp ?? '',
        eco_temp:     p.eco_temp     ?? '',
        child_lock:   p.child_lock   ?? null,
      };
      this.profileScheduleForm = this._emptyProfileScheduleForm();
      if (p.schedules) {
        for (const row of this.profileScheduleForm) {
          row.periods = this._periodsFromDay(p.schedules, row.day);
        }
      }
      // Pre-fill shortcut forms from Monday (week) and Saturday (weekend)
      this.profileWeekPeriods = this._periodsFromDay(p.schedules, 'monday');
      this.profileWeekendPeriods = this._periodsFromDay(p.schedules, 'saturday');
      this.profileSchedTab = 'week';
      this.profileMsg = '';
      this.showProfileModal = true;
    },

    async submitProfileModal() {
      this.profileMsg = '';
      const name = this.profileForm.name.trim();
      if (!name) { this.profileMsg = this.t('err_name_required2'); return; }
      const body = {name};
      if (this.profileForm.comfort_temp !== '') body.comfort_temp = parseFloat(this.profileForm.comfort_temp);
      if (this.profileForm.eco_temp     !== '') body.eco_temp     = parseFloat(this.profileForm.eco_temp);
      if (this.profileForm.child_lock   !== null) body.child_lock = this.profileForm.child_lock;
      // If week or weekend tab is active, apply shortcut data to individual form first
      if (this.profileSchedTab === 'week') this.applyWeekToSchedule();
      else if (this.profileSchedTab === 'weekend') this.applyWeekendToSchedule();
      // Build schedules from the 7-day individual form
      const schedules = {};
      for (const row of this.profileScheduleForm) {
        const active = row.periods.filter(p => p.start && p.end);
        if (active.length > 0) schedules[row.day] = active;
      }
      if (Object.keys(schedules).length > 0) body.schedules = schedules;
      const res = await fetch(`${API}/api/profiles/${encodeURIComponent(name)}`, {
        method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
      });
      if (res.ok) {
        this.profileMsg = '✓ Gespeichert';
        await this.loadProfiles();
        setTimeout(() => { this.showProfileModal = false; this.profileMsg = ''; }, 800);
      } else {
        const err = await res.json().catch(() => ({}));
        this.profileMsg = 'Fehler: ' + (err.detail || res.statusText);
      }
    },

    async deleteProfile(name) {
      if (!confirm(this.t('confirm_delete_profile').replace('{name}', name))) return;
      const res = await fetch(`${API}/api/profiles/${encodeURIComponent(name)}`, {method: 'DELETE'});
      if (res.ok) {
        this.showProfileModal = false;
        await this.loadProfiles();
        this.showToast(this.t('toast_profile_deleted').replace('{name}', name));
      } else {
        const err = await res.json().catch(() => ({}));
        this.profileMsg = 'Error: ' + (err.detail || res.statusText);
      }
    },

    openApplyProfile(name) {
      this.applyProfileName = name;
      this.applyProfileTargets = this.devices.map(d => d.address);
      this.applyProfileMsg = '';
      this.applyProfileApplying = false;
      this.applyProfileResults = {};
      this.applyProfileProgress = {done: 0, total: 0};
      this.applyProfileLog = [];
      this.showApplyProfile = true;
    },

    async submitApplyProfile() {
      if (!this.applyProfileTargets.length) return;
      this.applyProfileApplying = true;
      this.applyProfileResults = {};
      this.applyProfileProgress = {done: 0, total: this.applyProfileTargets.length};
      this.applyProfileLog = [];

      const res = await fetch(`${API}/api/profiles/${encodeURIComponent(this.applyProfileName)}/apply`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({devices: this.applyProfileTargets, apply_schedules: true}),
      }).catch(() => null);
      if (!res?.ok) { this.applyProfileApplying = false; this.applyProfileMsg = this.t('toast_apply_err'); return; }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '', event = '', data = '';
      while (true) {
        const {value, done} = await reader.read();
        if (done) break;
        buf += decoder.decode(value, {stream: true});
        const lines = buf.split(/\r?\n/);
        buf = lines.pop();
        for (const line of lines) {
          if (line.startsWith('event:')) { event = line.slice(6).trim(); }
          else if (line.startsWith('data:')) { data = line.slice(5).trim(); }
          else if (line.trim() === '' && event && data) {
            try {
              const payload = JSON.parse(data);
              if (event === 'progress') {
                this.applyProfileResults = {...this.applyProfileResults, [payload.address]: 'applying'};
                const devName = this.devices.find(d => d.address === payload.address)?.name || payload.address.substring(0,8);
                this.applyProfileLog = [...this.applyProfileLog, {text: `→ ${this.t('szenen_applying').replace('…','')} ${devName}…`, type: 'info'}];
                setTimeout(() => { const el = document.getElementById('applyProfileLogEl'); if (el) el.scrollTop = el.scrollHeight; }, 0);
              } else if (event === 'result') {
                this.applyProfileResults = {...this.applyProfileResults, [payload.address]: payload.status};
                this.applyProfileProgress = {...this.applyProfileProgress, done: this.applyProfileProgress.done + 1};
                const devName = this.devices.find(d => d.address === payload.address)?.name || payload.address.substring(0,8);
                const log = [...this.applyProfileLog];
                const resultLine = payload.status === 'ok'
                  ? {text: `✓ ${devName}`, type: 'ok'}
                  : {text: `✗ ${devName}: ${payload.status}`, type: 'error'};
                if (log.length > 0) log[log.length - 1] = resultLine; else log.push(resultLine);
                this.applyProfileLog = log;
                setTimeout(() => { const el = document.getElementById('applyProfileLogEl'); if (el) el.scrollTop = el.scrollHeight; }, 0);
              }
            } catch(e) { console.warn('SSE parse error', e, {event, data}); }
            event = ''; data = '';
          }
        }
      }

      this.applyProfileApplying = false;
      await this.loadDevices();
      const errors = Object.entries(this.applyProfileResults).filter(([,v]) => v !== 'ok');
      if (errors.length) {
        this.applyProfileMsg = `${this.t('toast_apply_err')} (${errors.length} ${this.t('szenen_devices_count')})`;
      } else {
        this.applyProfileMsg = `✓ ${this.applyProfileTargets.length} ${this.t('szenen_devices_count')}`;
        setTimeout(() => { this.showApplyProfile = false; this.applyProfileMsg = ''; }, 1500);
      }
    },

    // ── BLE busy helpers ─────────────────────────────────────────

    _bleLock(msg, address) {
      if (address) this.busyDevices = {...this.busyDevices, [address]: msg || 'BLE…'};
    },
    _bleUnlock(address) {
      if (address) { const d = {...this.busyDevices}; delete d[address]; this.busyDevices = d; }
    },

    // ── Helpers ──────────────────────────────────────────────────

    fmt(v) { return v != null ? v.toFixed(1) : '—'; },
    fmtTime(iso) { if (!iso) return ''; return new Date(iso).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}); },
    fmtDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleString([], {dateStyle: 'short', timeStyle: 'short'}); },
    // Detect address format: MAC (AA:BB:CC:DD:EE:FF) vs CoreBluetooth UUID (macOS)
    fmtAddr(addr) {
      if (!addr) return '—';
      // MAC format: 6 groups of 2 hex chars separated by colons
      if (/^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$/.test(addr)) return addr;
      // CoreBluetooth UUID (macOS): show shortened first 8 chars + note
      return addr.substring(0, 8).toUpperCase() + '… (macOS UUID)';
    },
    showToast(msg) { this.toast = msg; setTimeout(() => { this.toast = ''; }, 3000); },
  };
}
</script>
