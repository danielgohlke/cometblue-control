<!DOCTYPE html>
<html lang="en" x-data="app()" x-init="init()">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CometBlue Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-bar { transition: width 0.4s linear; }
    .ble-bar { animation: ble-slide 1.4s ease-in-out infinite; }
    @keyframes ble-slide {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(0%); }
      100% { transform: translateX(100%); }
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans" x-cloak>

<!-- BLE Loading bar (top) — shown when any device is busy -->
<div x-show="Object.keys(busyDevices).length > 0" class="fixed top-0 left-0 right-0 z-[100] h-0.5 bg-blue-100 overflow-hidden">
  <div class="ble-bar h-full w-1/2 bg-blue-500 rounded-full"></div>
</div>

<!-- Navigation -->
<nav class="bg-blue-700 text-white shadow-md">
  <div class="max-w-6xl mx-auto px-4 flex items-center gap-1 h-14">
    <span class="font-bold text-lg tracking-wide mr-4">🔥 CometBlue</span>
    <template x-for="tab in ['dashboard','monitor','devices','profiles','szenen','discovery']" :key="tab">
      <button @click="page=tab; localStorage.setItem('cb_page',tab); onPageChange(tab)"
        :class="page===tab ? 'border-b-2 border-white bg-blue-800' : 'opacity-70 hover:opacity-100'"
        class="relative px-3 py-1 text-sm font-medium rounded-t">
        <span x-text="t('nav_tab_' + tab)"></span>
        <span x-show="tab === 'dashboard' && alerts.length > 0"
          class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-white text-xs flex items-center justify-center leading-none"
          x-text="alerts.length"></span>
      </button>
    </template>
    <div class="ml-auto flex items-center gap-3">
      <span class="text-xs opacity-60" x-text="status.next_poll && autoPoll ? 'Next poll: ' + fmtTime(status.next_poll) : ''"></span>
      <button @click="pollAll()" :disabled="pollingAll"
        :title="t('nav_title_poll')"
        class="flex items-center gap-1 text-xs px-2 py-0.5 rounded transition-all"
        :class="pollingAll ? 'bg-blue-800 opacity-70 cursor-not-allowed' : 'opacity-60 hover:opacity-100 hover:bg-blue-800'">
        <svg :class="pollingAll ? 'animate-spin' : ''" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        <span x-text="pollingAll ? t('nav_polling') : t('nav_poll_all')"></span>
      </button>
      <!-- Auto-Poll Toggle -->
      <div class="flex items-center gap-1.5">
        <label class="flex items-center gap-1.5 cursor-pointer" :title="t('nav_title_autopoll')">
          <span class="text-xs" :class="autoPoll ? 'text-green-300' : 'text-white opacity-40'" x-text="t('nav_auto_poll')"></span>
          <button @click="toggleAutoPoll()"
            class="relative w-9 h-5 rounded-full transition-colors duration-200 focus:outline-none"
            :class="autoPoll ? 'bg-green-500' : 'bg-gray-500'">
            <span class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform duration-200"
              :class="autoPoll ? 'translate-x-4' : 'translate-x-0'"></span>
          </button>
        </label>
        <span x-show="autoPoll" class="text-xs text-yellow-300 opacity-80" :title="t('autopoll_battery_tooltip')">🔋⚠</span>
      </div>
      <button @click="setLang(lang === 'de' ? 'en' : 'de')"
        :title="lang === 'de' ? 'Switch to English' : 'Auf Deutsch wechseln'"
        class="text-xs px-2 py-0.5 rounded font-mono transition-all opacity-60 hover:opacity-100 hover:bg-blue-800"
        x-text="lang === 'de' ? 'EN' : 'DE'"></button>
      <button @click="debugMode=!debugMode" :title="t('nav_title_debug')"
        :class="debugMode ? 'bg-yellow-400 text-yellow-900' : 'opacity-40 hover:opacity-70 text-white'"
        class="text-xs px-2 py-0.5 rounded font-mono transition-all">DBG</button>
      <a href="https://github.com/danielgohlke/cometblue-control" target="_blank" rel="noopener"
        title="GitHub — danielgohlke/cometblue-control"
        class="opacity-40 hover:opacity-100 transition-all flex items-center">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
        </svg>
      </a>
    </div>
  </div>
</nav>

<!-- Alert Banner -->
<div x-show="alerts.length > 0" class="max-w-6xl mx-auto px-4 pt-3 space-y-1.5">
  <template x-for="a in alerts" :key="a.id">
    <div class="flex items-center gap-2 text-sm px-3 py-2 rounded-lg"
      :class="{
        'bg-red-50 border border-red-200 text-red-800': a.level === 'error',
        'bg-yellow-50 border border-yellow-200 text-yellow-800': a.level === 'warn',
        'bg-blue-50 border border-blue-200 text-blue-700': a.level === 'info'
      }">
      <span x-text="a.level === 'error' ? '🔴' : a.level === 'warn' ? '🟡' : 'ℹ️'"></span>
      <span x-text="a.msg"></span>
    </div>
  </template>
</div>

<main class="max-w-6xl mx-auto px-4 py-6">

  <!-- ══════════════════ DASHBOARD ══════════════════ -->
  <div x-show="page === 'dashboard'">
    <h1 class="text-2xl font-bold mb-4" x-text="t('dashboard_title')"></h1>
    <div x-show="devices.length === 0" class="text-gray-500 italic">
      <span x-text="t('dashboard_no_devices')"></span> <button @click="page='discovery'" class="text-blue-600 underline" x-text="t('dashboard_discover_link')"></button>.
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <template x-for="dev in devices" :key="dev.address">
        <div class="bg-white rounded-xl shadow p-4 border border-gray-100 relative overflow-hidden">
          <!-- Per-card BLE loading bar -->
          <div x-show="busyDevices[dev.address]" class="absolute top-0 left-0 right-0 h-0.5 bg-blue-100 overflow-hidden z-10">
            <div class="ble-bar h-full w-1/2 bg-blue-500"></div>
          </div>
          <div class="flex justify-between items-start mb-2">
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-1">
                <span class="font-semibold truncate" x-text="dev.name || dev.address"></span>
                <button @click="openRename(dev)" class="text-gray-400 hover:text-blue-500 flex-shrink-0" title="Rename">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                </button>
                <button @click="removeDevice(dev.address)" class="text-gray-300 hover:text-red-500 flex-shrink-0" title="Remove">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
              </div>
              <div class="text-xs text-gray-400" x-text="fmtAddr(dev.address)" :title="dev.address"></div>
              <div x-show="dev.mac_address" class="text-xs text-blue-500 font-mono" x-text="'MAC: ' + dev.mac_address"></div>
            </div>
            <div class="text-right flex-shrink-0 ml-2">
              <div x-show="dev.status?.battery != null" class="text-xs text-gray-500" :title="t('battery_tooltip')">🔋 <span x-text="dev.status?.battery + '%'"></span></div>
              <div class="text-xs"
                :class="dev.status?.error ? 'text-red-500' : (dev.status?.polled_at ? 'text-green-500' : 'text-gray-400')"
                x-text="dev.status?.error
                  ? (dev.status.error.startsWith('auth_failed') ? 'Wrong PIN' : 'Error')
                  : (dev.status?.polled_at ? 'OK' : 'Not polled')"></div>
            </div>
          </div>

          <!-- RSSI bar -->
          <div x-show="dev.rssi != null" class="mb-2">
            <div class="flex items-center gap-2">
              <span class="text-xs text-gray-400 w-8">RSSI</span>
              <div class="flex-1 bg-gray-100 rounded-full h-1.5 overflow-hidden">
                <div class="h-1.5 rounded-full transition-all duration-500"
                  :class="dev.rssi >= -60 ? 'bg-green-500' : dev.rssi >= -75 ? 'bg-yellow-400' : 'bg-red-400'"
                  :style="`width: ${Math.max(0, Math.min(100, (dev.rssi + 100) * 2.5))}%`"></div>
              </div>
              <span class="text-xs text-gray-400 w-14 text-right" x-text="dev.rssi + ' dBm'"></span>
            </div>
          </div>

          <div x-show="dev.status && (dev.status.temp_current != null || dev.status.temp_comfort != null)" class="mt-3 space-y-1"
            :class="dev.status?.error ? 'opacity-60' : ''">
            <div class="flex justify-between">
              <span class="text-sm text-gray-500" x-text="t('dash_temp_current')"></span>
              <span class="font-bold text-blue-600" x-text="fmt(dev.status?.temp_current) + ' °C'"></span>
            </div>
            <div class="flex justify-between">
              <span class="text-sm text-gray-500" x-text="t('dash_temp_comfort')"></span>
              <span class="font-semibold text-orange-600" x-text="fmt(dev.status?.temp_comfort) + ' °C'"></span>
            </div>
            <div class="flex justify-between">
              <span class="text-sm text-gray-500" x-text="t('dash_temp_eco')"></span>
              <span class="text-sm text-blue-500" x-text="fmt(dev.status?.temp_eco) + ' °C'"></span>
            </div>
            <div x-show="dev.status?.child_lock != null" class="flex justify-between items-center">
              <span class="text-sm text-gray-500" x-text="t('dash_child_lock')"></span>
              <button @click="toggleChildLock(dev)"
                :disabled="busyDevices[dev.address]"
                :title="dev.status?.child_lock ? t('dash_child_lock_disable') : t('dash_child_lock_enable')"
                class="text-sm font-medium px-2 py-0.5 rounded transition-colors"
                :class="dev.status?.child_lock ? 'text-orange-600 hover:bg-orange-50' : 'text-gray-400 hover:bg-gray-100'">
                <span x-text="dev.status?.child_lock ? t('dash_child_lock_on') : t('dash_child_lock_off')"></span>
              </button>
            </div>
            <!-- Debug section -->
            <template x-if="debugMode && dev.status">
              <div class="mt-2 pt-2 border-t border-dashed border-yellow-300 space-y-0.5">
                <div class="text-xs font-medium text-yellow-600 mb-1">🐛 Debug</div>
                <template x-for="[k, v] in Object.entries(dev.status).filter(([k]) => !['address'].includes(k))" :key="k">
                  <div class="flex justify-between gap-2">
                    <span class="text-xs text-gray-400 shrink-0" x-text="k"></span>
                    <span class="text-xs text-gray-500 font-mono truncate" x-text="v ?? '—'"></span>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Error state -->
          <div x-show="dev.status?.error" class="mt-3 bg-red-50 border border-red-100 rounded-lg p-3">
            <div class="text-sm font-medium text-red-700"
              x-text="dev.status?.error?.startsWith('auth_failed') ? '🔒 Authentication failed — wrong PIN?' : '⚠ Connection error'"></div>
            <div class="text-xs text-red-400 mt-0.5 truncate"
              x-text="(dev.status?.error || '').replace(/^(auth_failed|ble_error): /, '')"></div>
            <button x-show="dev.status?.error?.includes('not found') && dev.mac_address"
              @click="rediscoverDevice(dev)"
              class="mt-2 w-full text-xs bg-orange-100 text-orange-700 border border-orange-200 rounded px-2 py-1 hover:bg-orange-200"
              x-text="t('dash_rediscover')">
            </button>
          </div>

          <!-- Never polled state -->
          <div x-show="!dev.status" class="mt-3 text-sm text-gray-400 italic" x-text="t('dash_never_polled')"></div>

          <!-- BLE busy status strip -->
          <div x-show="busyDevices[dev.address]" class="mt-2 mb-1 flex items-center gap-1.5 text-xs text-blue-500">
            <svg class="spinner w-3 h-3 flex-shrink-0" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>
            <span x-text="busyDevices[dev.address]"></span>
          </div>
          <div class="mt-3 flex flex-wrap gap-2">
            <button @click="openSetTemp(dev)" :disabled="!!busyDevices[dev.address]"
              class="flex-1 text-sm bg-blue-600 text-white rounded px-3 py-1 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed" x-text="t('dash_btn_temps')"></button>
            <button @click="openSchedule(dev)" :disabled="!!busyDevices[dev.address]"
              class="flex-1 text-sm bg-green-600 text-white rounded px-3 py-1 hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed" x-text="t('dash_btn_schedule')"></button>
          </div>
          <div class="mt-1.5 flex gap-2">
            <button @click="pollDevice(dev.address)" :disabled="!!pollingDevices[dev.address] || !!busyDevices[dev.address]"
              class="flex-1 text-sm bg-gray-100 rounded px-3 py-1 hover:bg-gray-200 disabled:opacity-50 flex items-center justify-center gap-1">
              <svg x-show="!!pollingDevices[dev.address]" class="spinner w-3.5 h-3.5" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
              </svg>
              <span x-text="pollingDevices[dev.address] ? t('dash_btn_polling') : t('dash_btn_poll')"></span>
            </button>
            <button @click="openFixPin(dev)" :disabled="!!busyDevices[dev.address]"
              class="text-sm bg-yellow-100 text-yellow-800 rounded px-3 py-1 hover:bg-yellow-200 disabled:opacity-50">🔑 PIN</button>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- ══════════════════ MONITOR ══════════════════ -->
  <div x-show="page === 'monitor'">
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold" x-text="t('monitor_title')"></h1>
      <div class="flex items-center gap-2">
        <span class="text-sm text-gray-500" x-text="t('monitor_range')"></span>
        <template x-for="h in [1,6,24,72,168]" :key="h">
          <button @click="monitorHours=h; loadMonitor()"
            :class="monitorHours===h ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 border hover:bg-gray-50'"
            class="px-2.5 py-1 rounded text-xs font-medium"
            x-text="h < 24 ? h+'h' : (h/24|0)+'d'"></button>
        </template>
        <button @click="loadMonitor()" class="ml-1 text-gray-400 hover:text-blue-600" title="Refresh">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
      </div>
    </div>

    <div x-show="monitorLoading" class="flex justify-center py-16 text-gray-400 gap-2">
      <svg class="spinner w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
      <span x-text="t('monitor_loading')"></span>
    </div>

    <div x-show="!monitorLoading && devices.length === 0" class="text-gray-400 italic" x-text="t('monitor_no_devices')"></div>

    <div x-show="!monitorLoading" class="space-y-6">
      <template x-for="dev in devices" :key="dev.address">
        <div class="bg-white rounded-xl shadow p-4 border border-gray-100">
          <div class="flex justify-between items-start mb-3">
            <div>
              <div class="font-semibold" x-text="dev.name"></div>
              <div class="text-xs text-gray-400" x-text="dev.address"></div>
            </div>
            <div class="text-right text-sm">
              <div x-show="dev.status?.temp_current != null">
                <span x-text="t('dash_temp_current')"></span>: <span class="font-bold text-blue-600" x-text="fmt(dev.status?.temp_current) + ' °C'"></span>
              </div>
              <div x-show="dev.status?.battery != null" class="text-xs text-gray-400" :title="t('battery_tooltip')">
                🔋 <span x-text="dev.status?.battery + '%'"></span>
              </div>
            </div>
          </div>
          <!-- Chart canvas — ID keyed by address -->
          <div class="relative h-56">
            <canvas :id="'chart-' + dev.address"></canvas>
            <div x-show="!monitorData[dev.address]?.length"
              class="absolute inset-0 flex items-center justify-center text-gray-300 text-sm"
              x-text="t('monitor_no_data')">
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- ══════════════════ DEVICES ══════════════════ -->
  <div x-show="page === 'devices'">
    <div class="flex flex-wrap justify-between items-center mb-4 gap-2">
      <h1 class="text-2xl font-bold" x-text="t('devices_title')"></h1>
      <div class="flex items-center gap-2">
        <button @click="setChildLockAll(true)" :disabled="childLockBusy"
          :title="t('devices_lock_all_title')"
          class="flex items-center gap-1 text-xs px-3 py-1.5 rounded border border-orange-300 text-orange-700 hover:bg-orange-50 disabled:opacity-50 transition-colors">
          <svg x-show="childLockBusy" class="spinner w-3 h-3" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
          <span x-text="t('devices_lock_all')"></span>
        </button>
        <button @click="setChildLockAll(false)" :disabled="childLockBusy"
          :title="t('devices_unlock_all_title')"
          class="flex items-center gap-1 text-xs px-3 py-1.5 rounded border border-gray-300 text-gray-600 hover:bg-gray-50 disabled:opacity-50 transition-colors"
          x-text="t('devices_unlock_all')">
        </button>
        <button @click="showAddDevice=true" class="bg-blue-600 text-white px-4 py-1.5 rounded text-sm hover:bg-blue-700" x-text="t('devices_add_btn')"></button>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
          <tr>
            <th class="px-4 py-3 text-left" x-text="t('devices_col_name')"></th>
            <th class="px-4 py-3 text-left" x-text="t('devices_col_address')"></th>
            <th class="px-4 py-3 text-left" x-text="t('devices_col_temp')"></th>
            <th class="px-4 py-3 text-left" x-text="t('devices_col_battery')"></th>
            <th class="px-4 py-3 text-left" x-text="t('devices_col_seen')"></th>
            <th class="px-4 py-3 text-left" x-text="t('devices_col_actions')"></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <template x-for="dev in devices" :key="dev.address">
            <tr class="hover:bg-gray-50">
              <td class="px-4 py-3">
                <div class="flex items-center gap-1.5">
                  <span class="font-medium" x-text="dev.name"></span>
                  <button @click="openRename(dev)" class="text-gray-400 hover:text-blue-500" title="Rename">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                  </button>
                </div>
              </td>
              <td class="px-4 py-3 font-mono text-xs text-gray-500" x-text="fmtAddr(dev.address)" :title="dev.address"></td>
              <td class="px-4 py-3" x-text="fmt(dev.status?.temp_current)"></td>
              <td class="px-4 py-3" :title="t('battery_tooltip')" x-text="dev.status?.battery != null ? dev.status.battery + '%' : '—'"></td>
              <td class="px-4 py-3 text-xs text-gray-400" x-text="dev.last_seen ? fmtDate(dev.last_seen) : '—'"></td>
              <td class="px-4 py-3">
                <div class="flex gap-3">
                  <button @click="openSetTemp(dev)" class="text-blue-600 hover:underline" x-text="t('devices_action_temps')"></button>
                  <button @click="pollDevice(dev.address)" :disabled="!!pollingDevices[dev.address] || !!busyDevices[dev.address] || pollingAll"
                    class="text-gray-500 hover:underline disabled:opacity-40 flex items-center gap-1">
                    <svg x-show="!!pollingDevices[dev.address]" class="spinner w-3 h-3" fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                    </svg>
                    <span x-text="pollingDevices[dev.address] ? t('devices_action_polling') : t('devices_action_poll')"></span>
                  </button>
                  <button @click="openFixPin(dev)" class="text-yellow-600 hover:underline" title="Set/update PIN">
                    PIN <span x-text="dev.pin != null ? '(' + dev.pin + ')' : ''"></span>
                  </button>
                  <button @click="removeDevice(dev.address)" class="text-red-500 hover:underline" x-text="t('devices_action_remove')"></button>
                </div>
              </td>
            </tr>
          </template>
          <tr x-show="devices.length === 0">
            <td colspan="6" class="px-4 py-8 text-center text-gray-400" x-text="t('devices_no_devices')"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ══════════════════ PROFILES ══════════════════ -->
  <div x-show="page === 'profiles'">
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold" x-text="t('profiles_title')"></h1>
      <button @click="openNewProfile()" class="bg-blue-600 text-white px-4 py-1.5 rounded text-sm hover:bg-blue-700" x-text="t('profiles_new_btn')"></button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <template x-for="p in profiles" :key="p.name">
        <div class="bg-white rounded-xl shadow p-4 border border-gray-100">
          <div class="flex justify-between items-start mb-2">
            <div class="font-semibold text-lg capitalize" x-text="p.name"></div>
            <button @click="openEditProfile(p)" class="text-gray-400 hover:text-blue-500" title="Edit">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            </button>
          </div>
          <div class="space-y-1 text-sm text-gray-600 mb-3">
            <div class="flex justify-between"><span x-text="t('profiles_comfort')"></span>   <span class="font-medium text-orange-600" x-text="p.comfort_temp != null ? p.comfort_temp + ' °C' : '—'"></span></div>
            <div class="flex justify-between"><span x-text="t('profiles_eco')"></span> <span class="font-medium text-blue-500"   x-text="p.eco_temp     != null ? p.eco_temp     + ' °C' : '—'"></span></div>
          </div>
          <template x-if="p.schedules && Object.keys(p.schedules).length > 0">
            <div class="mb-3 space-y-0.5">
              <div class="text-xs font-medium text-gray-500 mb-1" x-text="t('profiles_schedules_label')"></div>
              <template x-for="[day, periods] in Object.entries(p.schedules)" :key="day">
                <div class="text-xs text-gray-500 flex gap-1 flex-wrap">
                  <span class="font-medium text-gray-700 w-16" x-text="profileDayLabel(day)"></span>
                  <template x-for="period in periods.filter(pp => pp.start && pp.end)" :key="period.start">
                    <span class="bg-blue-50 text-blue-700 rounded px-1" x-text="period.start + '–' + period.end"></span>
                  </template>
                </div>
              </template>
            </div>
          </template>
          <button @click="openApplyProfile(p.name)" class="w-full bg-blue-600 text-white rounded px-3 py-1.5 text-sm hover:bg-blue-700" x-text="t('profiles_apply_btn')"></button>
        </div>
      </template>
      <div x-show="profiles.length === 0" class="col-span-3 text-gray-400 italic" x-text="t('profiles_no_profiles')"></div>
    </div>
  </div>

  <!-- ══════════════════ SZENEN ══════════════════ -->
  <div x-show="page === 'szenen'">
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold" x-text="t('szenen_title')"></h1>
      <button @click="openNewPreset()" class="bg-blue-600 text-white px-4 py-1.5 rounded text-sm hover:bg-blue-700" x-text="t('szenen_new_btn')"></button>
    </div>
    <p class="text-sm text-gray-500 mb-5" x-text="t('szenen_description')"></p>

    <div x-show="presets.length === 0" class="text-gray-400 italic" x-text="t('szenen_no_scenes')"></div>

    <div class="space-y-4">
      <template x-for="preset in presets" :key="preset.id">
        <div class="bg-white rounded-xl shadow border border-gray-100 p-4">
          <div class="flex items-center justify-between mb-3">
            <div class="font-semibold text-lg" x-text="preset.name"></div>
            <div class="flex gap-2">
              <button @click="openEditPreset(preset)"
                class="text-gray-400 hover:text-blue-500 p-1" :title="t('szenen_edit_title')">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
              </button>
              <button @click="deletePreset(preset.id)"
                class="text-gray-400 hover:text-red-500 p-1" :title="t('szenen_delete_title')">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </div>
          <!-- Assignment overview with live status -->
          <div class="grid grid-cols-2 gap-x-6 gap-y-0.5 mb-4">
            <template x-for="dev in devices" :key="dev.address">
              <div class="flex items-center gap-2 text-sm py-1 border-b border-gray-50">
                <!-- Status icon slot -->
                <span class="w-4 flex-shrink-0 flex items-center justify-center">
                  <template x-if="presetResults[preset.id]?.[dev.address] === 'applying'">
                    <span class="spinner inline-block w-3 h-3 border-2 border-blue-400 border-t-transparent rounded-full"></span>
                  </template>
                  <template x-if="presetResults[preset.id]?.[dev.address] === 'ok'">
                    <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                  </template>
                  <template x-if="presetResults[preset.id]?.[dev.address] && presetResults[preset.id]?.[dev.address] !== 'ok' && presetResults[preset.id]?.[dev.address] !== 'applying'">
                    <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
                  </template>
                </span>
                <span class="flex-1 text-gray-700 truncate" x-text="dev.name || dev.address.substring(0,8)"
                  :title="presetResults[preset.id]?.[dev.address] && presetResults[preset.id]?.[dev.address] !== 'ok' && presetResults[preset.id]?.[dev.address] !== 'applying' ? presetResults[preset.id][dev.address] : ''"></span>
                <span class="font-medium flex-shrink-0"
                  :class="preset.assignments[dev.address] ? (presetResults[preset.id]?.[dev.address] === 'ok' ? 'text-green-600' : presetResults[preset.id]?.[dev.address] && presetResults[preset.id]?.[dev.address] !== 'applying' ? 'text-red-500' : 'text-blue-600') : 'text-gray-300'"
                  x-text="preset.assignments[dev.address] || '—'"></span>
              </div>
            </template>
          </div>
          <!-- Terminal log + progress bar -->
          <div x-show="presetLog.length > 0 && (presetApplying == preset.id || presetLogId == preset.id)" class="mb-3">
            <div class="bg-white border border-gray-200 rounded-lg px-3 py-2 font-mono text-xs max-h-28 overflow-y-auto space-y-0.5"
              id="presetLogEl">
              <template x-for="(line, i) in presetLog" :key="i">
                <div :class="line.type === 'ok' ? 'text-green-600' : line.type === 'error' ? 'text-red-500' : 'text-blue-500'"
                  x-text="line.text"></div>
              </template>
            </div>
            <div x-show="(presetProgress[preset.id]?.total || 0) > 0" class="mt-2">
              <div class="flex justify-between text-xs text-gray-400 mb-1">
                <span x-text="(presetProgress[preset.id]?.done || 0) + ' / ' + (presetProgress[preset.id]?.total || 0) + ' ' + t('szenen_devices_count')"></span>
                <span x-text="Math.round(((presetProgress[preset.id]?.done || 0) / (presetProgress[preset.id]?.total || 1)) * 100) + '%'"></span>
              </div>
              <div class="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden">
                <div class="progress-bar h-1.5 bg-blue-500 rounded-full"
                  :style="'width:' + Math.round(((presetProgress[preset.id]?.done || 0) / (presetProgress[preset.id]?.total || 1)) * 100) + '%'"></div>
              </div>
            </div>
          </div>
          <button @click="applyPreset(preset)"
            :disabled="presetApplying === preset.id"
            class="w-full bg-blue-600 text-white rounded px-3 py-1.5 text-sm hover:bg-blue-700 disabled:opacity-50 flex items-center justify-center gap-2">
            <svg x-show="presetApplying === preset.id" class="spinner w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
            <span x-text="presetApplying === preset.id ? t('szenen_applying') : t('szenen_apply_btn')"></span>
          </button>
        </div>
      </template>
    </div>
  </div>

  <!-- ══════════════════ DISCOVERY ══════════════════ -->
  <div x-show="page === 'discovery'">
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold" x-text="t('discovery_title')"></h1>
      <div class="flex items-center gap-3">
        <label class="text-sm text-gray-500 flex items-center gap-1.5" x-show="!discovering">
          <span x-text="t('discovery_duration')"></span>
          <select x-model.number="scanTimeout" class="border rounded px-2 py-1 text-sm">
            <option value="10">10 s</option>
            <option value="20">20 s</option>
            <option value="30">30 s</option>
            <option value="60">60 s</option>
          </select>
        </label>
        <button @click="runDiscovery()" :disabled="discovering"
          class="bg-blue-600 text-white px-4 py-1.5 rounded text-sm hover:bg-blue-700 disabled:opacity-50 flex items-center gap-2">
          <svg x-show="discovering" class="spinner w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
          </svg>
          <span x-text="discovering ? t('discovery_scanning') : t('discovery_scan_btn')"></span>
        </button>
      </div>
    </div>

    <!-- Progress bar -->
    <div x-show="discovering || scanDone" class="mb-5">
      <div class="flex justify-between text-xs text-gray-500 mb-1">
        <span x-show="discovering" x-text="t('discovery_scanning') + ' ' + Math.round(scanElapsed) + 's / ' + scanTimeout + 's'"></span>
        <span x-show="!discovering && scanDone" class="text-green-600 font-medium" x-text="t('discovery_scan_complete')"></span>
        <span x-text="discovered.length + ' ' + t('discovery_found')"></span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
        <div class="progress-bar h-2 rounded-full"
          :class="!discovering && scanDone ? 'bg-green-500' : 'bg-blue-500'"
          :style="`width: ${scanProgress}%`"></div>
      </div>
    </div>

    <!-- Known from DB (shown before scanning) -->
    <div x-show="!discovering && !scanDone && knownDevices.length > 0" class="mb-6">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3" x-text="t('discovery_previously')"></h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <template x-for="d in knownDevices" :key="d.address">
          <div class="bg-white rounded-xl shadow-sm p-3 border border-gray-100 flex justify-between items-center">
            <div>
              <div class="font-medium" x-text="d.name"></div>
              <div class="text-xs font-mono text-gray-400" x-text="d.address"></div>
              <div class="text-xs text-gray-400 mt-0.5"><span x-text="t('discovery_last_seen')"></span> <span x-text="fmtDate(d.last_seen)"></span></div>
            </div>
            <button @click="addDiscoveredDirect(d)" :disabled="d.configured"
              class="text-sm px-3 py-1.5 rounded flex-shrink-0 ml-3"
              :class="d.configured ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-green-600 text-white hover:bg-green-700'">
              <span x-text="d.configured ? t('discovery_added') : t('discovery_add')"></span>
            </button>
          </div>
        </template>
      </div>
    </div>

    <!-- Empty state -->
    <div x-show="!discovering && !scanDone && knownDevices.length === 0" class="text-gray-400 italic">
      <span x-text="t('discovery_press_scan')"></span> <strong x-text="t('discovery_scan_btn')"></strong> <span x-text="t('discovery_press_scan2')"></span>
    </div>
    <div x-show="scanDone && discovered.length === 0" class="text-gray-400 italic mt-2" x-text="t('discovery_no_found')"></div>

    <!-- Live scan results -->
    <div x-show="discovered.length > 0">
      <h2 x-show="scanDone || discovering" class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3"
        x-text="discovering ? t('discovery_found_so_far') : t('discovery_results')"></h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <template x-for="d in discovered" :key="d.address">
          <div class="bg-white rounded-xl shadow p-4 border border-gray-100 flex justify-between items-center"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-2"
            x-transition:enter-end="opacity-100 translate-y-0">
            <div>
              <div class="font-semibold" x-text="d.name"></div>
              <div class="text-xs font-mono text-gray-400" x-text="d.address"></div>
              <div class="text-xs mt-1 text-blue-600 font-medium flex items-center gap-2">
                CometBlue
                <span x-show="d.rssi" class="text-gray-400 font-normal" x-text="'RSSI ' + d.rssi + ' dBm'"></span>
              </div>
            </div>
            <div class="flex flex-col gap-1.5 flex-shrink-0 ml-3">
              <button @click="addDiscoveredDirect(d)" :disabled="isConfigured(d.address)"
                class="text-sm px-3 py-1.5 rounded"
                :class="isConfigured(d.address) ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-green-600 text-white hover:bg-green-700'">
                <span x-text="isConfigured(d.address) ? t('discovery_already_added') : t('discovery_add_device')"></span>
              </button>
              <button @click="openAssignModal(d)"
                :title="t('discovery_assign_title')"
                class="text-xs px-3 py-1 rounded bg-orange-100 text-orange-700 hover:bg-orange-200"
                x-text="t('discovery_assign_btn')">
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

</main>

<!-- ═══════════════════════════ MODALS ═══════════════════════════ -->

<!-- Set Temperature -->
<div x-show="showSetTemp" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" @click.self="showSetTemp=false">
  <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm mx-4">
    <h2 class="text-lg font-bold mb-1" x-text="t('modal_set_temp_title')"></h2>
    <p class="text-sm text-gray-500 mb-4" x-text="selectedDevice?.name || selectedDevice?.address"></p>
    <div x-show="tempLoading" class="flex items-center justify-center py-8 gap-3 text-gray-400">
      <svg class="spinner w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
      <span x-text="t('modal_set_temp_loading')"></span>
    </div>
    <div x-show="!tempLoading" class="space-y-3">
      <label class="block">
        <span class="text-sm font-medium text-orange-700" x-text="t('modal_comfort_label')"></span>
        <span class="text-xs text-gray-400 ml-1" x-text="t('modal_comfort_hint')"></span>
        <input type="number" step="0.5" min="5" max="35" x-model="tempForm.comfort" class="mt-1 block w-full border rounded px-3 py-1.5 text-sm" :placeholder="t('modal_comfort_placeholder')"></label>
      <label class="block">
        <span class="text-sm font-medium text-blue-600" x-text="t('modal_eco_label')"></span>
        <span class="text-xs text-gray-400 ml-1" x-text="t('modal_eco_hint')"></span>
        <input type="number" step="0.5" min="5" max="35" x-model="tempForm.eco" class="mt-1 block w-full border rounded px-3 py-1.5 text-sm" :placeholder="t('modal_eco_placeholder')"></label>
      <label class="block"><span class="text-sm text-gray-600" x-text="t('modal_offset_label')"></span>
        <input type="number" step="0.5" min="-3.5" max="3.5" x-model="tempForm.offset" class="mt-1 block w-full border rounded px-3 py-1.5 text-sm" placeholder="0.0"></label>
      <div class="flex items-center justify-between py-2 border-t">
        <span class="text-sm text-gray-600" x-text="t('modal_child_lock_label')"></span>
        <button @click="tempForm.child_lock = !tempForm.child_lock"
          class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors"
          :class="tempForm.child_lock ? 'bg-orange-500' : 'bg-gray-200'">
          <span class="inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform"
            :class="tempForm.child_lock ? 'translate-x-6' : 'translate-x-1'"></span>
        </button>
      </div>
    </div>
    <div x-show="!tempLoading" class="flex gap-2 mt-4">
      <button @click="submitSetTemp()" :disabled="tempSaving"
        class="flex-1 bg-blue-600 text-white rounded px-4 py-2 text-sm hover:bg-blue-700 disabled:opacity-50 flex items-center justify-center gap-2">
        <svg x-show="tempSaving" class="spinner w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
        <span x-text="tempSaving ? t('btn_saving') : t('btn_save')"></span>
      </button>
      <button @click="showSetTemp=false" class="flex-1 bg-gray-100 rounded px-4 py-2 text-sm hover:bg-gray-200" x-text="t('btn_cancel')"></button>
    </div>
    <div x-show="tempMsg" class="mt-2 text-sm" :class="tempMsg?.startsWith('Error') ? 'text-red-500' : 'text-green-600'" x-text="tempMsg"></div>
  </div>
</div>

<!-- Schedule / Heizzeiten -->
<div x-show="showSchedule" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" @click.self="showSchedule=false">
  <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-2xl mx-4 max-h-[90vh] flex flex-col">
    <div class="flex justify-between items-start mb-1">
      <div>
        <h2 class="text-lg font-bold" x-text="t('modal_schedule_title')"></h2>
        <p class="text-sm text-gray-500" x-text="selectedDevice?.name || selectedDevice?.address"></p>
      </div>
      <button @click="showSchedule=false" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>
    <p class="text-xs text-gray-400 mb-3" x-text="t('modal_schedule_hint')"></p>

    <div x-show="scheduleLoading" class="flex items-center justify-center py-12 gap-3 text-gray-400 flex-1">
      <svg class="spinner w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
      <span x-text="t('modal_schedule_loading')"></span>
    </div>

    <div x-show="!scheduleLoading && scheduleForm" class="overflow-y-auto flex-1">
      <template x-for="row in scheduleForm" :key="row.day">
        <div class="border-b last:border-0 py-3">
          <div class="font-medium text-sm text-gray-700 mb-2" x-text="row.label"></div>
          <div class="space-y-1.5">
            <template x-for="(p, pi) in row.periods" :key="pi">
              <div class="flex items-center gap-2">
                <span class="text-xs text-gray-400 w-6" x-text="pi + 1"></span>
                <input type="time" step="600" x-model="p.start"
                  class="border rounded px-2 py-1 text-sm w-28"
                  :class="p.start && !validTime(p.start) ? 'border-red-400' : ''">
                <span class="text-gray-400">–</span>
                <input type="time" step="600" x-model="p.end"
                  class="border rounded px-2 py-1 text-sm w-28"
                  :class="p.end && !validTime(p.end) ? 'border-red-400' : ''">
                <button @click="p.start = ''; p.end = ''" class="text-gray-300 hover:text-red-500 text-sm" :title="t('modal_schedule_delete_title')">✕</button>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>

    <div class="pt-3 flex gap-2 border-t mt-3">
      <button @click="submitSchedule()" :disabled="scheduleSaving"
        class="flex-1 bg-green-600 text-white rounded px-4 py-2 text-sm hover:bg-green-700 disabled:opacity-50 flex items-center justify-center gap-2">
        <svg x-show="scheduleSaving" class="spinner w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>

<!-- Profile Edit / Create -->

    <div class="flex justify-between items-start mb-4">

          <label class="block flex-1">
            <span class="text-sm text-gray-600" x-text="t('modal_profile_comfort_label')"></span>

              class="mt-1 block w-full border rounded px-3 py-1.5 text-sm" :placeholder="t('modal_profile_comfort_placeholder')">

          <label class="block flex-1">
            <span class="text-sm text-gray-600" x-text="t('modal_profile_eco_label')"></span>

              class="mt-1 block w-full border rounded px-3 py-1.5 text-sm" :placeholder="t('modal_profile_eco_placeholder')">
          </label>
        </div>
        <!-- Child Lock -->
        <div class="flex items-center justify-between py-2 border-t">
          <div>
            <span class="text-sm text-gray-700" x-text="t('modal_profile_childlock_label')"></span>
            <div class="text-xs text-gray-400" x-text="t('modal_profile_childlock_hint')"></div>

            <button @click="profileForm.child_lock = null"
              :class="profileForm.child_lock === null ? 'bg-gray-300 text-gray-800' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'"
              class="text-xs px-2 py-1 rounded transition-colors">—</button>
            <button @click="profileForm.child_lock = false"

              class="text-xs px-2 py-1 rounded transition-colors">🔓 Aus</button>
            <button @click="profileForm.child_lock = true"
              :class="profileForm.child_lock === true ? 'bg-orange-500 text-white' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'"
              class="text-xs px-2 py-1 rounded transition-colors">🔒 An</button>
          </div>
        </div>
      </div>

      <!-- Schedule -->
      <div>
        <div class="text-sm font-medium text-gray-700 mb-1" x-text="t('modal_profile_schedules_label')"></div>
        <p class="text-xs text-gray-400 mb-2" x-text="t('modal_profile_schedules_hint')"></p>

        <!-- Tab selection -->
        <div class="flex gap-1 mb-3">
          <button @click="profileSchedTab='week'"
            :class="profileSchedTab==='week' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
            class="px-3 py-1.5 rounded text-xs font-medium" x-text="t('modal_profile_tab_week')"></button>
          <button @click="profileSchedTab='weekend'"
            :class="profileSchedTab==='weekend' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
            class="px-3 py-1.5 rounded text-xs font-medium" x-text="t('modal_profile_tab_weekend')"></button>
          <button @click="profileSchedTab='individual'"
            :class="profileSchedTab==='individual' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
            class="px-3 py-1.5 rounded text-xs font-medium" x-text="t('modal_profile_tab_individual')"></button>
        </div>

        <!-- Weekdays -->
        <div x-show="profileSchedTab==='week'">
          <div class="space-y-1.5">
            <template x-for="(p, pi) in profileWeekPeriods" :key="pi">
              <div class="flex items-center gap-2">
                <span class="text-xs text-gray-400 w-4" x-text="pi + 1"></span>
                <input type="time" step="600" x-model="p.start"
                  class="border rounded px-2 py-1 text-sm w-28"
                  :class="p.start && !validTime(p.start) ? 'border-red-400' : ''">
                <span class="text-gray-400 text-sm">–</span>
                <input type="time" step="600" x-model="p.end"
                  class="border rounded px-2 py-1 text-sm w-28"
                  :class="p.end && !validTime(p.end) ? 'border-red-400' : ''">
                <button @click="p.start=''; p.end=''" class="text-gray-300 hover:text-red-500 text-sm" :title="t('modal_profile_schedule_delete_title')">✕</button>
              </div>
            </template>
          </div>
          <button @click="applyWeekToSchedule()"
            class="mt-2 text-xs bg-green-50 text-green-700 border border-green-200 rounded px-3 py-1 hover:bg-green-100"
            x-text="t('modal_profile_apply_week')">
          </button>
        </div>

        <!-- Weekend -->
        <div x-show="profileSchedTab==='weekend'">
          <div class="space-y-1.5">
            <template x-for="(p, pi) in profileWeekendPeriods" :key="pi">
              <div class="flex items-center gap-2">
                <span class="text-xs text-gray-400 w-4" x-text="pi + 1"></span>
                <input type="time" step="600" x-model="p.start"
                  class="border rounded px-2 py-1 text-sm w-28"
                  :class="p.start && !validTime(p.start) ? 'border-red-400' : ''">
                <span class="text-gray-400 text-sm">–</span>
                <input type="time" step="600" x-model="p.end"
                  class="border rounded px-2 py-1 text-sm w-28"
                  :class="p.end && !validTime(p.end) ? 'border-red-400' : ''">
                <button @click="p.start=''; p.end=''" class="text-gray-300 hover:text-red-500 text-sm" :title="t('modal_profile_schedule_delete_title')">✕</button>
              </div>
            </template>
          </div>
          <button @click="applyWeekendToSchedule()"
            class="mt-2 text-xs bg-green-50 text-green-700 border border-green-200 rounded px-3 py-1 hover:bg-green-100"
            x-text="t('modal_profile_apply_weekend')">
          </button>
        </div>

        <!-- Individual -->
        <div x-show="profileSchedTab==='individual'">
          <template x-for="row in profileScheduleForm" :key="row.day">
            <div class="border-b last:border-0 py-2">
              <div class="font-medium text-xs text-gray-600 mb-1.5" x-text="row.label"></div>
              <div class="space-y-1">
                <template x-for="(p, pi) in row.periods" :key="pi">
                  <div class="flex items-center gap-2">
                    <span class="text-xs text-gray-400 w-4" x-text="pi + 1"></span>
                    <input type="time" step="600" x-model="p.start"
                      class="border rounded px-2 py-1 text-sm w-28"
                      :class="p.start && !validTime(p.start) ? 'border-red-400' : ''">
                    <span class="text-gray-400 text-sm">–</span>
                    <input type="time" step="600" x-model="p.end"
                      class="border rounded px-2 py-1 text-sm w-28"
                      :class="p.end && !validTime(p.end) ? 'border-red-400' : ''">
                    <button @click="p.start=''; p.end=''" class="text-gray-300 hover:text-red-500 text-sm" :title="t('modal_profile_schedule_delete_title')">✕</button>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <div x-show="profileMsg" class="mt-3 text-sm"
      :class="profileMsg.startsWith('Error') || profileMsg.startsWith('Fehler') ? 'text-red-500' : 'text-green-600'" x-text="profileMsg"></div>
    <div class="flex gap-2 mt-4 pt-3 border-t">
      <button @click="submitProfileModal()" class="flex-1 bg-blue-600 text-white rounded px-4 py-2 text-sm hover:bg-blue-700" x-text="t('btn_save')"></button>
      <button x-show="profileEditMode" @click="deleteProfile(profileForm.name)"
        class="bg-red-100 text-red-600 rounded px-4 py-2 text-sm hover:bg-red-200" x-text="t('modal_profile_delete_btn')"></button>
      <button @click="showProfileModal=false" class="flex-1 bg-gray-100 rounded px-4 py-2 text-sm hover:bg-gray-200" x-text="t('btn_cancel')"></button>
    </div>
  </div>
</div>

<div x-show="showApplyProfile" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" @click.self="!applyProfileApplying && (showApplyProfile=false)">
  <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm mx-4">
    <h2 class="text-lg font-bold mb-1" x-text="t('modal_apply_profile_title')"></h2>
    <p class="text-sm text-gray-500 mb-4"><span x-text="t('modal_apply_profile_desc')"></span> <strong x-text="applyProfileName"></strong> <span x-text="t('modal_apply_profile_desc2')"></span></p>

    <!-- Device list with live status -->
    <div class="space-y-1 mb-3">
      <template x-for="dev in devices" :key="dev.address">
        <div class="flex items-center gap-2 px-2 py-1.5 rounded"
          :class="applyProfileApplying ? 'cursor-default' : 'cursor-pointer hover:bg-gray-50'"
          @click="if (!applyProfileApplying) { const i = applyProfileTargets.indexOf(dev.address); i >= 0 ? applyProfileTargets.splice(i,1) : applyProfileTargets.push(dev.address); }">
          <!-- Checkbox (selection phase) or status icon (apply phase) -->
          <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center">
            <template x-if="!applyProfileApplying && !applyProfileResults[dev.address]">
              <input type="checkbox" :checked="applyProfileTargets.includes(dev.address)"
                @click.stop
                @change="const i = applyProfileTargets.indexOf(dev.address); i >= 0 ? applyProfileTargets.splice(i,1) : applyProfileTargets.push(dev.address)"
                class="rounded border-gray-300 text-blue-600 pointer-events-none">
            </template>
            <template x-if="applyProfileResults[dev.address] === 'applying'">
              <span class="spinner inline-block w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full"></span>
            </template>
            <template x-if="applyProfileResults[dev.address] === 'ok'">
              <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
            </template>
            <template x-if="applyProfileResults[dev.address] && applyProfileResults[dev.address] !== 'ok' && applyProfileResults[dev.address] !== 'applying'">
              <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
            </template>
          </span>
          <span class="text-sm font-medium flex-1"
            :class="applyProfileApplying && !applyProfileTargets.includes(dev.address) ? 'text-gray-300' : ''"
            x-text="dev.name || dev.address"></span>
          <!-- Error tooltip or address -->
          <span class="text-xs ml-auto"
            :class="applyProfileResults[dev.address] && applyProfileResults[dev.address] !== 'ok' && applyProfileResults[dev.address] !== 'applying' ? 'text-red-400' : 'text-gray-400 font-mono'"
            :title="applyProfileResults[dev.address] && applyProfileResults[dev.address] !== 'ok' && applyProfileResults[dev.address] !== 'applying' ? applyProfileResults[dev.address] : ''"
            x-text="applyProfileResults[dev.address] && applyProfileResults[dev.address] !== 'ok' && applyProfileResults[dev.address] !== 'applying' ? t('modal_apply_error_label') : dev.address.substring(0,8) + '…'"></span>
        </div>
      </template>
    </div>

    <!-- Select all / none (only before apply) -->
    <div x-show="!applyProfileApplying && !Object.keys(applyProfileResults).length" class="flex gap-2 text-xs mb-3">
      <button @click="applyProfileTargets = devices.map(d => d.address)" class="text-blue-600 hover:underline" x-text="t('modal_apply_select_all')"></button>
      <span class="text-gray-300">|</span>
      <button @click="applyProfileTargets = []" class="text-gray-500 hover:underline" x-text="t('modal_apply_select_none')"></button>
    </div>

    <div x-show="applyProfileLog.length > 0" class="mb-3">
      <div class="bg-white border border-gray-200 rounded-lg px-3 py-2 font-mono text-xs max-h-28 overflow-y-auto space-y-0.5"
        id="applyProfileLogEl">
        <template x-for="(line, i) in applyProfileLog" :key="i">

<script>
const API = '';
const CHART_COLORS = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899'];

// Chart registry so we can destroy/redraw
const _charts = {};

function destroyChart(id) {
  if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; }
}

function drawChart(canvasId, records, deviceName, labels) {
  destroyChart(canvasId);
  const canvas = document.getElementById(canvasId);
  if (!canvas || !records.length) return;

  const L = labels || {current: 'Current', comfort: 'Comfort', eco: 'Eco', battery: 'Battery'};
  const color = CHART_COLORS[Object.keys(_charts).length % CHART_COLORS.length];
  const hasBattery = records.some(r => r.battery != null && r.battery !== 255);
  const pts = records.length > 60 ? 0 : 2;

  _charts[canvasId] = new Chart(canvas, {
    type: 'line',
    data: {
      datasets: [
        {
          label: L.current,
          data: records.map(r => ({x: r.recorded_at, y: r.temp_current})),
          borderColor: color,
          backgroundColor: color + '20',
          fill: true,
          tension: 0.3,
          pointRadius: pts,
          borderWidth: 2,
          yAxisID: 'y',
        },
        {
          label: L.comfort,
          data: records.map(r => ({x: r.recorded_at, y: r.temp_comfort})),
          borderColor: '#f97316',
          borderDash: [4, 3],
          fill: false,
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 1.5,
          yAxisID: 'y',
        },
        {
          label: L.eco,
          data: records.map(r => ({x: r.recorded_at, y: r.temp_eco})),
          borderColor: '#60a5fa',
          borderDash: [2, 4],
          fill: false,
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 1.5,
          yAxisID: 'y',
        },
        ...(hasBattery ? [{
          label: L.battery,
          data: records.filter(r => r.battery != null && r.battery !== 255).map(r => ({x: r.recorded_at, y: r.battery})),
          borderColor: '#22c55e',
          borderDash: [3, 3],
          fill: false,
          tension: 0.3,
          pointRadius: pts,
          borderWidth: 1.5,
          yAxisID: 'y1',
        }] : []),
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } },
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.yAxisID === 'y1'
              ? `${ctx.dataset.label}: ${ctx.parsed.y}% (neu = ~80–90%)`
              : `${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(1)} °C`,
          },
        },
      },
      scales: {
        x: {
          type: 'time',
          time: { tooltipFormat: 'dd.MM HH:mm', displayFormats: { hour: 'HH:mm', day: 'dd.MM' } },
          grid: { color: '#f1f5f9' },
          ticks: { font: { size: 10 }, maxTicksLimit: 8 },
        },
        y: {
          position: 'left',
          title: { display: true, text: '°C', font: { size: 10 } },
          grid: { color: '#f1f5f9' },
          ticks: { font: { size: 10 }, callback: v => v + '°' },
        },
        y1: {
          position: 'right',
          min: 0, max: 100,
          title: { display: true, text: (L.battery || 'Battery') + ' %', font: { size: 10 } },
          grid: { drawOnChartArea: false },
          ticks: { font: { size: 10 }, callback: v => v + '%' },
        },
      },
    },
  });
}
