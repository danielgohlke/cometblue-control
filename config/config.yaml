# CometBlue Control Configuration

# Server bind address and port
# Change port here or via: cometblue-control serve --port 9000
host: "0.0.0.0"
port: 8080

# Polling interval in seconds
# Note: on Raspberry Pi 3B+, each device takes ~45s (slow GATT service discovery).
# With 7 devices allow at least 7 * 50s = 350s between polls.
poll_interval: 600

bluetooth:
  # Bluetooth adapter (null = system default, e.g. "hci0" on Linux)
  adapter: null
  scan_timeout: 10

ui:
  enabled: true

mcp:
  enabled: false

log_level: "INFO"

# TLS/HTTPS (optional)
# ssl_certfile: "/etc/cometblue/tls/cert.pem"
# ssl_keyfile:  "/etc/cometblue/tls/key.pem"
