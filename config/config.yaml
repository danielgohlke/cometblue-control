# CometBlue Control Configuration

host: "0.0.0.0"
port: 8080

# Polling interval in seconds (default: every 5 minutes)
poll_interval: 300

bluetooth:
  # Bluetooth adapter (null = system default, e.g. "hci0" on Linux)
  adapter: null
  scan_timeout: 10

ui:
  enabled: true

mcp:
  enabled: false

log_level: "INFO"
